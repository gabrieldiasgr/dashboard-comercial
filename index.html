<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Comercial</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:       #05080f;
      --surface:  #0b1120;
      --border:   #142030;
      --border2:  #1c2e46;
      --text-hi:  #eef4ff;
      --text-md:  #7a9cc2;
      --text-lo:  #3d5a78;
      --green:    #00e890;
      --blue:     #4d9eff;
      --cyan:     #00d9ff;
      --purple:   #a855f7;
      --red:      #ff6b6b;
      --amber:    #ffb03a;
      --radius:   clamp(8px, 1vw, 14px);
      --gap:      clamp(6px, 1vw, 12px);
      --pad:      clamp(10px, 1.5vw, 20px);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at 15% 40%, rgba(77,158,255,0.06) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 15%, rgba(168,85,247,0.07) 0%, transparent 55%),
        radial-gradient(ellipse at 50% 90%, rgba(0,217,255,0.04) 0%, transparent 50%);
      color: var(--text-hi);
      min-height: 100vh;
      padding: var(--pad);
      display: flex; flex-direction: column; gap: var(--gap);
    }

    /* ── DESKTOP: single screen ── */
    @media (min-width: 900px) {
      body { height: 100vh; overflow: hidden; }
    }

    /* ── TOP BAR ─── */
    .top-bar {
      display: flex; justify-content: space-between; align-items: center;
      flex-shrink: 0; gap: 8px; flex-wrap: wrap;
    }
    .top-bar .logo-img {
      height: clamp(22px, 2.8vh, 34px); width: auto; object-fit: contain;
      filter: brightness(0) invert(1); opacity: 0.92;
    }
    .controls { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .controls select {
      background: rgba(12,18,32,0.9); border: 1px solid var(--border2); color: var(--text-hi);
      padding: clamp(4px,0.5vw,7px) clamp(8px,1vw,14px);
      border-radius: var(--radius); font-size: clamp(11px,1vw,13px);
      cursor: pointer; outline: none; transition: border-color .15s;
      backdrop-filter: blur(8px);
    }
    .controls select:focus { border-color: var(--cyan); box-shadow: 0 0 0 2px rgba(0,217,255,0.15); }
    .btn {
      border: none; padding: clamp(4px,0.5vw,7px) clamp(10px,1vw,16px);
      border-radius: var(--radius); cursor: pointer;
      font-size: clamp(11px,1vw,13px); font-weight: 600; transition: all .15s;
    }
    .btn-refresh { background: rgba(18,36,72,0.9); color: #93c5fd; border: 1px solid #1e3a6e; backdrop-filter: blur(8px); }
    .btn-refresh:hover { background: rgba(25,50,100,0.9); box-shadow: 0 0 12px rgba(77,158,255,0.3); }

    /* ── MAIN GRID ─── */
    .dash-grid {
      flex: 1; display: grid; min-height: 0;
      grid-template-rows: auto 1fr 1fr;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: var(--gap);
    }
    .dash-grid .kpi-row { grid-column: 1/-1; display: grid; grid-template-columns: repeat(6,1fr); gap: var(--gap); }
    .area-funnel  { grid-column: 1/3; grid-row: 2; }
    .area-gauge   { grid-column: 3/5; grid-row: 2; }
    .area-closers { grid-column: 1/3; grid-row: 3; }
    .area-sdrs    { grid-column: 3/5; grid-row: 3; }

    /* ── TABLET ── */
    @media (max-width: 899px) and (min-width: 600px) {
      .dash-grid {
        grid-template-rows: auto auto auto auto;
        grid-template-columns: 1fr 1fr;
      }
      .dash-grid .kpi-row { grid-template-columns: repeat(3,1fr); }
      .area-funnel  { grid-column: 1/2; grid-row: 2; }
      .area-gauge   { grid-column: 2/3; grid-row: 2; }
      .area-closers { grid-column: 1/3; grid-row: 3; }
      .area-sdrs    { grid-column: 1/3; grid-row: 4; }
    }

    /* ── MOBILE ── */
    @media (max-width: 599px) {
      .dash-grid {
        grid-template-rows: unset;
        grid-template-columns: 1fr;
        display: flex; flex-direction: column;
      }
      .dash-grid .kpi-row { grid-template-columns: repeat(2,1fr); }
      .area-funnel, .area-gauge, .area-closers, .area-sdrs { min-height: 280px; }
    }

    /* ── BASE CARD ─── */
    .card {
      background: linear-gradient(145deg, #0e1829 0%, #0b1120 60%, #080e1c 100%);
      border: 1px solid var(--border2);
      border-radius: var(--radius); padding: var(--pad);
      position: relative; overflow: hidden;
      display: flex; flex-direction: column; height: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04);
      transition: box-shadow .2s;
    }
    .card:hover { box-shadow: 0 6px 32px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.06); }
    .card-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: var(--radius) var(--radius) 0 0; }
    .bar-green  { background: linear-gradient(90deg,#00b86a,#00e890); box-shadow: 0 0 18px rgba(0,232,144,0.8), 0 0 36px rgba(0,232,144,0.3); }
    .bar-blue   { background: linear-gradient(90deg,#2a70e0,#00d9ff); box-shadow: 0 0 18px rgba(0,217,255,0.8), 0 0 36px rgba(77,158,255,0.3); }
    .bar-purple { background: linear-gradient(90deg,#a855f7,#ec4899); box-shadow: 0 0 18px rgba(168,85,247,0.8), 0 0 36px rgba(236,72,153,0.3); }
    .bar-amber  { background: linear-gradient(90deg,#f59e0b,#ef4444); box-shadow: 0 0 18px rgba(255,176,58,0.8), 0 0 36px rgba(239,68,68,0.3); }
    .bar-cyan   { background: linear-gradient(90deg,#00d9ff,#a855f7); box-shadow: 0 0 18px rgba(0,217,255,0.8), 0 0 36px rgba(168,85,247,0.3); }
    .card-label {
      font-size: clamp(9px,0.7vw,11px); font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.2px;
      color: var(--text-md); margin-bottom: 6px; margin-top: 4px;
    }
    .card-value {
      font-size: clamp(18px,2vw,30px); font-weight: 800;
      color: var(--text-hi); line-height: 1; letter-spacing: -.5px;
    }
    .card-sub { font-size: clamp(10px,0.8vw,12px); color: var(--text-lo); margin-top: 5px; }

    /* ── FUNNEL ─── */
    .funnel-card {
      background: linear-gradient(145deg, #0e1829 0%, #0b1120 60%, #080e1c 100%);
      border: 1px solid var(--border2);
      border-radius: var(--radius); padding: var(--pad);
      height: 100%; display: flex; flex-direction: column;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .funnel-title {
      font-size: clamp(9px,0.7vw,11px); font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.2px;
      color: var(--text-md); text-align: center; margin-bottom: 10px;
    }
    .funnel-row { display: grid; grid-template-columns: 56% 44%; align-items: stretch; }
    .funnel-shape-cell { height: clamp(40px,5vh,58px); display: flex; align-items: center; justify-content: center; }
    .fl-1 { clip-path: polygon(0% 0%,100% 0%,95% 100%,5% 100%);  background: linear-gradient(135deg,#143060,#1a4090); }
    .fl-2 { clip-path: polygon(5% 0%,95% 0%,89% 100%,11% 100%);  background: linear-gradient(135deg,#1a46a0,#0066cc); }
    .fl-3 { clip-path: polygon(11% 0%,89% 0%,82% 100%,18% 100%); background: linear-gradient(135deg,#143060,#1a4090); }
    .fl-4 { clip-path: polygon(18% 0%,82% 0%,53% 100%,47% 100%); background: linear-gradient(135deg,#1a46a0,#0066cc); }
    .funnel-num { font-size: clamp(16px,1.8vw,24px); font-weight: 800; color: #fff; text-shadow: 0 0 12px rgba(255,255,255,0.4); }
    .funnel-conv-row { display: grid; grid-template-columns: 56% 44%; height: 18px; }
    .funnel-conv-cell { display: flex; align-items: center; justify-content: center; }
    .conv-pill {
      display: flex; align-items: center; gap: 4px;
      font-size: clamp(9px,0.8vw,11px); font-weight: 700;
      color: #ffb03a; background: rgba(255,176,58,.14);
      padding: 2px 8px; border-radius: 20px;
      box-shadow: 0 0 8px rgba(255,176,58,0.2);
    }
    .funnel-label-cell {
      display: flex; flex-direction: column; justify-content: center;
      padding: 0 0 0 12px; border-left: 2px solid var(--border2);
    }
    .fl-label { font-size: clamp(10px,0.9vw,12px); color: var(--text-md); font-weight: 500; line-height: 1.3; }
    .fl-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 6px; width: 85%; overflow: hidden; }
    .fl-bar-fill { height: 100%; background: linear-gradient(90deg, var(--blue), var(--cyan)); border-radius: 2px; box-shadow: 0 0 8px rgba(0,217,255,0.5); }
    .funnel-footer { text-align: center; margin-top: 8px; font-size: clamp(10px,0.9vw,12px); color: var(--text-lo); }

    /* ── GAUGE CARD ─── */
    .gauge-card {
      background: linear-gradient(145deg, #0e1829 0%, #0b1120 60%, #080e1c 100%);
      border: 1px solid var(--border2);
      border-radius: var(--radius); padding: var(--pad);
      height: 100%; display: flex; flex-direction: column;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .gauge-title {
      font-size: clamp(9px,0.7vw,11px); font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.2px;
      color: var(--text-md); text-align: center; margin-bottom: 8px;
    }
    .gauge-svg-wrap { display: flex; justify-content: center; position: relative; flex-shrink: 0; }
    .gauge-center-val {
      position: absolute; bottom: -2px; left: 50%; transform: translateX(-50%);
      font-size: clamp(14px,1.5vw,20px); font-weight: 800;
      color: var(--text-hi); white-space: nowrap;
      text-shadow: 0 0 20px rgba(240,246,255,0.3);
    }
    .gauge-axis { display: flex; justify-content: space-between; padding: 0 6px; font-size: clamp(9px,0.7vw,10px); color: #2a3f5c; margin-top: 2px; }
    .gauge-pct-val { font-size: clamp(24px,2.8vw,38px); font-weight: 800; text-align: center; margin-top: 4px; filter: drop-shadow(0 0 12px currentColor); }
    .gauge-pct-label { font-size: clamp(9px,0.7vw,10px); color: var(--text-lo); text-align: center; text-transform: uppercase; letter-spacing: .8px; }
    .gauge-stats { display: flex; justify-content: space-around; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
    .gs { text-align: center; }
    .gs-val { font-size: clamp(12px,1.1vw,15px); font-weight: 700; color: var(--text-hi); }
    .gs-lbl { font-size: clamp(9px,0.7vw,10px); color: var(--text-lo); margin-top: 2px; text-transform: uppercase; letter-spacing: .6px; }

    /* ── TABLE CARDS ─── */
    .table-card {
      background: linear-gradient(145deg, #0e1829 0%, #0b1120 60%, #080e1c 100%);
      border: 1px solid var(--border2);
      border-radius: var(--radius); overflow: hidden;
      height: 100%; display: flex; flex-direction: column;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .table-header { padding: clamp(8px,1vw,12px) clamp(12px,1.5vw,18px); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .table-header span {
      font-size: clamp(10px,0.8vw,12px); font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.2px; color: var(--text-md);
    }
    .tbl-scroll { overflow-y: auto; flex: 1; }
    .tbl-scroll::-webkit-scrollbar { width: 4px; }
    .tbl-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      padding: clamp(6px,0.8vw,10px) clamp(10px,1.2vw,16px);
      font-size: clamp(9px,0.7vw,11px); font-weight: 700;
      text-transform: uppercase; letter-spacing: .8px;
      color: var(--text-md); background: rgba(5,8,15,0.8);
      text-align: left; white-space: nowrap; position: sticky; top: 0;
    }
    thead th.num { text-align: right; }
    tbody tr { border-bottom: 1px solid #10192a; transition: background .15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(77,158,255,.07); }
    tbody td {
      padding: clamp(7px,0.9vw,11px) clamp(10px,1.2vw,16px);
      font-size: clamp(11px,1vw,14px); color: var(--text-md); white-space: nowrap;
    }
    tbody td.num { text-align: right; color: var(--text-hi); font-weight: 600; }
    tbody td.name { font-weight: 600; color: var(--text-hi); }
    .tag-pct { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: clamp(10px,0.8vw,12px); font-weight: 700; }
    .tag-green { background: rgba(0,232,144,.14); color: var(--green); box-shadow: 0 0 8px rgba(0,232,144,0.2); }
    .tag-blue  { background: rgba(77,158,255,.14); color: var(--blue); box-shadow: 0 0 8px rgba(77,158,255,0.2); }
    .tag-red   { background: rgba(255,107,107,.14); color: var(--red); box-shadow: 0 0 8px rgba(255,107,107,0.2); }

    /* ── PODIUM ─── */
    .podium-card {
      background: linear-gradient(145deg, #0e1829 0%, #0b1120 60%, #080e1c 100%);
      border: 1px solid var(--border2);
      border-radius: var(--radius); padding: var(--pad);
      height: 100%; display: flex; flex-direction: column;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .podium-title {
      font-size: clamp(9px,0.7vw,11px); font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.2px;
      color: var(--text-md); text-align: center; margin-bottom: 10px;
    }
    .podium-stage { display: flex; align-items: flex-end; justify-content: center; gap: clamp(8px,2vw,20px); flex: 1; }
    .podium-slot { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .podium-slot.p1 { order: 2; }
    .podium-slot.p2 { order: 1; }
    .podium-slot.p3 { order: 3; }
    .podium-avatar {
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-weight: 800; color: #fff; flex-shrink: 0; border: 2px solid var(--border2);
    }
    .p1 .podium-avatar { width: clamp(48px,5vw,68px); height: clamp(48px,5vw,68px); font-size: clamp(16px,1.8vw,22px); border-color: var(--blue); box-shadow: 0 0 20px rgba(77,158,255,0.5), 0 0 40px rgba(77,158,255,0.2); }
    .p2 .podium-avatar { width: clamp(38px,4vw,54px); height: clamp(38px,4vw,54px); font-size: clamp(13px,1.4vw,18px); border-color: var(--purple); box-shadow: 0 0 14px rgba(168,85,247,0.4); }
    .p3 .podium-avatar { width: clamp(38px,4vw,54px); height: clamp(38px,4vw,54px); font-size: clamp(13px,1.4vw,18px); border-color: var(--cyan); box-shadow: 0 0 14px rgba(0,217,255,0.3); }
    .podium-crown { font-size: clamp(16px,1.8vw,22px); line-height: 1; filter: drop-shadow(0 0 8px rgba(255,220,0,0.6)); }
    .podium-name { font-size: clamp(11px,1vw,13px); font-weight: 700; color: var(--text-hi); text-align: center; max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .podium-pct { font-size: clamp(15px,1.6vw,20px); font-weight: 800; text-align: center; }
    .podium-sub { font-size: clamp(9px,0.8vw,11px); color: var(--text-lo); text-align: center; }
    .podium-block { border-radius: 8px 8px 0 0; display: flex; align-items: center; justify-content: center; font-size: clamp(14px,1.5vw,20px); font-weight: 900; color: rgba(255,255,255,.4); }
    .p1 .podium-block { width: clamp(70px,7vw,100px); height: clamp(44px,5vh,60px); background: linear-gradient(180deg,#1a3a80,#122060); border: 1px solid #2255aa; box-shadow: 0 0 24px rgba(30,58,128,0.6); }
    .p2 .podium-block { width: clamp(60px,6vw,88px); height: clamp(30px,4vh,44px); background: linear-gradient(180deg,#2a1060,#1a0840); border: 1px solid #5520a0; box-shadow: 0 0 16px rgba(100,30,150,0.4); }
    .p3 .podium-block { width: clamp(60px,6vw,88px); height: clamp(20px,3vh,32px); background: linear-gradient(180deg,#063040,#041820); border: 1px solid #0a6080; box-shadow: 0 0 12px rgba(0,120,150,0.3); }

    /* ── FILTER TABS ─── */
    .filter-tabs { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
    .ftab {
      border: 1px solid var(--border2); background: rgba(11,17,32,0.8); color: var(--text-lo);
      padding: 4px 11px; border-radius: 20px;
      font-size: clamp(10px,0.9vw,12px); font-weight: 600;
      cursor: pointer; transition: all .2s; white-space: nowrap;
      backdrop-filter: blur(8px);
    }
    .ftab:hover { border-color: var(--cyan); color: var(--cyan); box-shadow: 0 0 10px rgba(0,217,255,0.2); }
    .ftab.active { background: rgba(0,100,180,0.2); border-color: var(--blue); color: #7ec8ff; box-shadow: 0 0 12px rgba(77,158,255,0.3); }
    .filter-label { font-size: clamp(10px,0.8vw,11px); color: var(--text-lo); }
    .date-range { display: flex; align-items: center; gap: 5px; animation: fadeIn .2s; }
    .date-range input[type=date] {
      background: rgba(11,17,32,0.9); border: 1px solid var(--border2); color: var(--text-hi);
      padding: 3px 8px; border-radius: 7px; font-size: clamp(10px,0.9vw,12px);
      outline: none; cursor: pointer; color-scheme: dark;
    }
    .date-range input[type=date]:focus { border-color: var(--cyan); box-shadow: 0 0 8px rgba(0,217,255,0.2); }
    .date-range span { font-size: clamp(9px,0.8vw,11px); color: var(--text-lo); }
    @keyframes fadeIn { from { opacity:0; transform: translateX(-4px); } to { opacity:1; transform: translateX(0); } }

    /* ── STATE ─── */
    .state-wrap { background: linear-gradient(145deg, #0e1829, #080e1c); border: 1px solid var(--border2); border-radius: var(--radius); padding: 22px 20px; box-shadow: 0 4px 24px rgba(0,0,0,0.4); }
    .loading-row { display: flex; align-items: center; gap: 10px; color: var(--text-lo); font-size: 13px; }
    .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--cyan); border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; box-shadow: 0 0 8px rgba(0,217,255,0.4); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-box { background: rgba(30,5,10,0.8); border: 1px solid rgba(255,50,50,0.3); border-radius: 8px; padding: 10px 14px; color: var(--red); font-size: 12px; line-height: 1.6; }
    .hint-text { color: var(--text-lo); font-size: 12px; }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="top-bar">
    <img src="scale-logo.png" alt="Scale Company" class="logo-img">
    <div class="controls">
      <div class="filter-tabs">
        <span class="filter-label">Fechamentos:</span>
        <button class="ftab active" id="ftab-all"    onclick="setFilter('all')">Todos</button>
        <button class="ftab"        id="ftab-mesmo"  onclick="setFilter('mesmo_mes')">Leads do mês</button>
        <button class="ftab"        id="ftab-outros" onclick="setFilter('outros_meses')">Leads de outros meses</button>
        <div class="date-range" id="dateRangeWrap" style="display:none">
          <span>entrada de</span>
          <input type="date" id="dateFrom" onchange="loadData()">
          <span>até</span>
          <input type="date" id="dateTo" onchange="loadData()">
        </div>
      </div>
      <select id="monthSelect"></select>
      <select id="yearSelect"></select>
      <button class="btn btn-refresh" onclick="reload()">↻ Atualizar</button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="dash-grid" id="dashGrid">
    <div class="kpi-row"><div class="state-wrap" style="grid-column:1/-1"><div class="loading-row"><div class="spinner"></div>Carregando dados...</div></div></div>
  </div>

  <script>
    // ════════════════════════════════════════════════════
    //  CONFIG
    // ════════════════════════════════════════════════════
    const BOARD_ID   = '9613941689';
    const MONDAY_URL = '/api/monday';
    const SHEETS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSlckOQ4Er4jS7SnS2aZwGdnSsifKZCbwmf1JdVLsVGXMsWNjUDabpk4o_dsuWRBG013pzFEFoDl-U_/pub?gid=0&single=true&output=csv';

    // Monthly goals (Ano-Mês: valor)
    const METAS = {
      '2025-11': 50000,  '2025-12': 35000,
      '2026-01': 50000,  '2026-02': 45000,
      '2026-03': 50000,  '2026-04': 60000,
      '2026-05': 70000,  '2026-06': 80000,
      '2026-07': 90000,  '2026-08': 1000000,
      '2026-09': 1100000,'2026-10': 1200000,
      '2026-11': 1300000,'2026-12': 1400000,
    };

    const COL = {
      etapa    : 'color_mksyb52r',
      mrr      : 'numeric_mksykxx',
      dtFecha  : 'date_mksyxsgr',
      dtEntrada: 'data',
      dtAgenda : 'date_mkt23t3n',
      closer   : 'dropdown_mkt2ehgd',
      sdr      : 'dropdown_mkt2jm28',
    };

    const ETAPA_REALIZADA = new Set(['R1 Realizada','R2 Agendado','Follow Up','Proposta em Análise','Fechado','Perdido Closer','Contato Futuro','Desqualificado']);
    const ETAPA_AGENDADA  = new Set(['Agendadas','No-Show','R1 Realizada','R2 Agendado','Follow Up','Proposta em Análise','Fechado','Perdido Closer','Contato Futuro','Desqualificado']);

    // ════════════════════════════════════════════════════
    //  STATE
    // ════════════════════════════════════════════════════
    let allItems       = null;
    let fechadoCache   = null;
    let investimentos  = {};
    let closingFilter  = 'all';

    // ════════════════════════════════════════════════════
    //  SELECTORS
    // ════════════════════════════════════════════════════
    const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

    function initSelectors() {
      const now  = new Date();
      const mSel = document.getElementById('monthSelect');
      const ySel = document.getElementById('yearSelect');
      MONTHS.forEach((m, i) => {
        const o = document.createElement('option');
        o.value = i + 1; o.textContent = m;
        if (i === now.getMonth()) o.selected = true;
        mSel.appendChild(o);
      });
      for (let y = now.getFullYear(); y >= 2025; y--) {
        const o = document.createElement('option');
        o.value = y; o.textContent = y;
        if (y === now.getFullYear()) o.selected = true;
        ySel.appendChild(o);
      }
      mSel.addEventListener('change', loadData);
      ySel.addEventListener('change', loadData);
    }

    // ════════════════════════════════════════════════════
    //  TOKEN
    // ════════════════════════════════════════════════════
    function reload() { allItems = null; fechadoCache = null; loadData(); }
    function setFilter(f) {
      closingFilter = f;
      ['all','mesmo','outros'].forEach(k => document.getElementById('ftab-'+k)?.classList.remove('active'));
      document.getElementById('ftab-'+(f==='all'?'all':f==='mesmo_mes'?'mesmo':'outros'))?.classList.add('active');
      document.getElementById('dateRangeWrap').style.display = f==='outros_meses' ? 'flex' : 'none';
      loadData();
    }

    // ════════════════════════════════════════════════════
    //  HELPERS
    // ════════════════════════════════════════════════════
    const pad = n => String(n).padStart(2,'0');

    function colVal(item, id) {
      const c = item.column_values?.find(c => c.id === id);
      return c?.text || null;
    }
    function dateMonth(s) {
      if (!s) return null;
      const d = new Date(s + 'T12:00:00Z');
      return `${d.getUTCFullYear()}-${pad(d.getUTCMonth()+1)}`;
    }
    function fmt(v) {
      return new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL',minimumFractionDigits:0,maximumFractionDigits:0}).format(v||0);
    }
    function pctTag(num, den) {
      if (!den) return '<span class="tag-pct tag-blue">—</span>';
      const p = num/den*100;
      const cls = p>=50?'tag-green':p>=20?'tag-blue':'tag-red';
      return `<span class="tag-pct ${cls}">${p.toFixed(1)}%</span>`;
    }

    // ════════════════════════════════════════════════════
    //  GOOGLE SHEETS — INVESTIMENTO
    // ════════════════════════════════════════════════════
    async function fetchInvestimentos() {
      try {
        const res  = await fetch(SHEETS_URL);
        const text = await res.text();
        const rows = text.trim().split('\n').slice(1); // skip header
        rows.forEach(row => {
          const [mes, valor] = row.split(',');
          if (mes && valor) investimentos[mes.trim()] = parseFloat(valor.trim()) || 0;
        });
      } catch(e) { /* silently ignore — investimento ficará 0 */ }
    }

    // ════════════════════════════════════════════════════
    //  GAUGE SVG
    // ════════════════════════════════════════════════════
    function buildGaugeSVG(mrr, meta) {
      const W=190, H=105, cx=95, cy=100, r=78;
      const pct    = meta > 0 ? Math.min(mrr/meta, 1.0) : 0;
      const color  = !meta ? '#334155' : mrr>=meta ? '#00c875' : mrr/meta>=0.7 ? '#f59e0b' : '#3b82f6';
      const bgPath = `M ${cx-r},${cy} A ${r},${r} 0 0,1 ${cx+r},${cy}`;
      const glowId = `glow_${Math.random().toString(36).slice(2,7)}`;
      let fill = '';
      if (pct > 0.005) {
        const eX = (cx - r * Math.cos(pct * Math.PI)).toFixed(2);
        const eY = (cy - r * Math.sin(pct * Math.PI)).toFixed(2);
        fill = `<path d="M ${cx-r},${cy} A ${r},${r} 0 0,1 ${eX},${eY}" fill="none" stroke="${color}" stroke-width="13" stroke-linecap="round" filter="url(#${glowId})"/>`;
      }
      return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="overflow:visible">
        <defs>
          <filter id="${glowId}" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <path d="${bgPath}" fill="none" stroke="#162035" stroke-width="13" stroke-linecap="round"/>
        ${fill}
      </svg>`;
    }

    // ════════════════════════════════════════════════════
    //  API
    // ════════════════════════════════════════════════════
    const COLS_LIST = [COL.etapa,COL.mrr,COL.dtFecha,COL.dtEntrada,COL.dtAgenda,COL.closer,COL.sdr].map(c=>`"${c}"`).join(',');

    async function gql(query) {
      const res = await fetch(MONDAY_URL,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({query})
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      if (json.errors) throw new Error(json.errors[0].message);
      return json.data;
    }

    async function fetchAllItems() {
      if (allItems) return allItems;
      let all=[], cursor=null;
      do {
        showLoading(`Carregando dados... ${all.length} itens`);
        const cp = cursor ? `, cursor: "${cursor}"` : '';
        const data = await gql(`{ boards(ids:[${BOARD_ID}]) { items_page(limit:200 ${cp}) { cursor items { id name column_values(ids:[${COLS_LIST}]) { id text } } } } }`);
        const page = data.boards[0].items_page;
        all = all.concat(page.items);
        cursor = page.cursor;
      } while (cursor);
      allItems     = all;
      fechadoCache = all.filter(i => colVal(i, COL.etapa) === 'Fechado');
      return all;
    }

    function getLeads(year, month) {
      const key = `${year}-${pad(month)}`;
      return (allItems||[]).filter(i => dateMonth(colVal(i,COL.dtEntrada)) === key);
    }
    const ETAPA_EXCLUIDA_AGENDA = new Set(['Em Aberto','Perdido SDR']);
    function getAgendadas(year, month) {
      const key = `${year}-${pad(month)}`;
      return (allItems||[]).filter(i =>
        dateMonth(colVal(i,COL.dtAgenda)) === key &&
        !ETAPA_EXCLUIDA_AGENDA.has(colVal(i,COL.etapa))
      );
    }
    function getClosings(year, month) {
      const key = `${year}-${pad(month)}`;
      return (fechadoCache||[]).filter(i => dateMonth(colVal(i,COL.dtFecha)) === key);
    }
    // Closings filtrado por origem do lead
    function getClosingsFilter(year, month, filter) {
      const closings = getClosings(year, month);
      const key = `${year}-${pad(month)}`;
      if (filter === 'mesmo_mes') return closings.filter(i => dateMonth(colVal(i,COL.dtEntrada)) === key);
      if (filter === 'outros_meses') {
        const from = document.getElementById('dateFrom')?.value;
        const to   = document.getElementById('dateTo')?.value;
        return closings.filter(i => {
          const entrada = colVal(i, COL.dtEntrada);
          if (!entrada) return false;
          if (dateMonth(entrada) === key) return false; // exclui leads do próprio mês
          if (from && entrada < from) return false;
          if (to   && entrada > to)   return false;
          return true;
        });
      }
      return closings;
    }

    // ════════════════════════════════════════════════════
    //  METRICS
    // ════════════════════════════════════════════════════
    function calcKPIs(leads, agendaItems, closings) {
      let mrr=0, closingCount=0;
      closings.forEach(i => { const v=parseFloat(colVal(i,COL.mrr)); if(v>0){mrr+=v;closingCount++;} });
      const total      = leads.length;
      const agendadas  = agendaItems.length;
      const realizadas = agendaItems.filter(i => ETAPA_REALIZADA.has(colVal(i,COL.etapa))).length;
      const fechados   = closings.length;
      return { mrr, closingCount, ticketMedio: closingCount?mrr/closingCount:0, total, agendadas, realizadas, fechados };
    }

    function calcClosers(agendaItems, closings) {
      const map = new Map();
      agendaItems.forEach(i => {
        const name=colVal(i,COL.closer); if(!name||name==='Nenhum'||name==='CS') return;
        if(!ETAPA_REALIZADA.has(colVal(i,COL.etapa))) return;
        if(!map.has(name)) map.set(name,{name,reunioes:0,fechados:0,mrr:0});
        map.get(name).reunioes++;
      });
      closings.forEach(i => {
        const name=colVal(i,COL.closer); if(!name||name==='Nenhum'||name==='CS') return;
        if(!map.has(name)) map.set(name,{name,reunioes:0,fechados:0,mrr:0});
        const v=parseFloat(colVal(i,COL.mrr))||0;
        map.get(name).fechados++; map.get(name).mrr+=v;
      });
      return [...map.values()].sort((a,b)=>b.mrr-a.mrr);
    }

    function calcSDRs(agendaItems) {
      const map = new Map();
      agendaItems.forEach(i => {
        const name=colVal(i,COL.sdr); if(!name) return;
        if(!map.has(name)) map.set(name,{name,agendadas:0,feitas:0});
        map.get(name).agendadas++;
        if(ETAPA_REALIZADA.has(colVal(i,COL.etapa))) map.get(name).feitas++;
      });
      return [...map.values()].filter(s=>s.agendadas>0).sort((a,b)=>b.agendadas-a.agendadas);
    }

    // ════════════════════════════════════════════════════
    //  PODIUM
    // ════════════════════════════════════════════════════
    const PODIUM_COLORS = ['#3b82f6','#8b5cf6','#06b6d4','#10b981','#f59e0b','#ec4899'];
    const SDR_PHOTOS = { 'josé': 'jose.jpg', 'jose': 'jose.jpg', 'henrique': 'henrique.jpg' };

    function initials(name) {
      return name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    }

    function buildPodiumSlot(sdr, rank, colorIdx) {
      if (!sdr) return `<div class="podium-slot p${rank}"><div class="podium-block">—</div></div>`;
      const color    = PODIUM_COLORS[colorIdx % PODIUM_COLORS.length];
      const pct      = sdr.agendadas ? (sdr.feitas/sdr.agendadas*100).toFixed(1) : '0.0';
      const pctColor = parseFloat(pct)>=60?'#00c875':parseFloat(pct)>=40?'#f59e0b':'#f87171';
      const crown    = rank===1 ? `<div class="podium-crown">👑</div>` : '';
      const photo    = SDR_PHOTOS[sdr.name.toLowerCase().split(' ')[0]];
      const avatar   = photo
        ? `<div class="podium-avatar" style="background:#0b1120;padding:0;overflow:hidden"><img src="${photo}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"></div>`
        : `<div class="podium-avatar" style="background:${color}">${initials(sdr.name)}</div>`;
      return `
        <div class="podium-slot p${rank}">
          ${crown}
          ${avatar}
          <div class="podium-name">${sdr.name.split(' ')[0]}</div>
          <div class="podium-pct" style="color:${pctColor}">${pct}%</div>
          <div class="podium-sub">${sdr.feitas} de ${sdr.agendadas} ag.</div>
          <div class="podium-block">${rank}º</div>
        </div>`;
    }

    function buildPodium(sdrs, label) {
      const sorted = [...sdrs].sort((a,b) => (b.agendadas+b.feitas) - (a.agendadas+a.feitas));
      const [s1, s2, s3] = [sorted[0], sorted[1], sorted[2]];
      return `
        <div class="podium-card">
          <div class="podium-title">🏆 Ranking SDRs — ${label}</div>
          <div class="podium-stage">
            ${buildPodiumSlot(s2, 2, 1)}
            ${buildPodiumSlot(s1, 1, 0)}
            ${buildPodiumSlot(s3, 3, 2)}
          </div>
        </div>`;
    }

    // ════════════════════════════════════════════════════
    //  RENDER
    // ════════════════════════════════════════════════════
    function renderDash(kpis, closers, sdrs, year, month, investimento) {
      const label    = `${MONTHS[month-1]} ${year}`;
      const monthKey = `${year}-${pad(month)}`;
      const meta     = METAS[monthKey] || 0;
      const metaPct  = meta > 0 ? kpis.mrr/meta*100 : 0;
      const metaColor= !meta ? '#64748b' : metaPct>=100 ? '#00c875' : metaPct>=70 ? '#f59e0b' : '#3b82f6';
      const diff     = kpis.mrr - meta;
      const roas     = investimento > 0 ? (kpis.mrr / investimento) : 0;

      const c2ag   = kpis.total     ? kpis.agendadas /kpis.total     : 0;
      const c2real = kpis.agendadas ? kpis.realizadas/kpis.agendadas  : 0;
      const c2fech = kpis.realizadas? kpis.fechados  /kpis.realizadas : 0;
      const totalConv = kpis.total ? (kpis.fechados/kpis.total*100).toFixed(1) : 0;

      const noData = s => `<tr><td colspan="${s}" style="padding:12px;color:#475569;font-size:12px">Sem dados para este mês</td></tr>`;

      document.getElementById('dashGrid').innerHTML = `

        <!-- ── ROW 1: KPIs ── -->
        <div class="kpi-row">
          <div class="card">
            <div class="card-bar bar-green"></div>
            <div class="card-label">MRR — ${label}</div>
            <div class="card-value">${fmt(kpis.mrr)}</div>
            <div class="card-sub">${kpis.closingCount} contratos fechados</div>
          </div>
          <div class="card">
            <div class="card-bar bar-blue"></div>
            <div class="card-label">Ticket Médio</div>
            <div class="card-value">${fmt(kpis.ticketMedio)}</div>
            <div class="card-sub">por contrato</div>
          </div>
          <div class="card">
            <div class="card-bar bar-purple"></div>
            <div class="card-label">Meta do Mês</div>
            <div class="card-value">${meta ? fmt(meta) : '—'}</div>
            <div class="card-sub">objetivo mensal</div>
          </div>
          <div class="card">
            <div class="card-bar" style="background:${metaColor}"></div>
            <div class="card-label">% da Meta Realizada</div>
            <div class="card-value" style="color:${metaColor}">${meta ? metaPct.toFixed(1)+'%' : '—'}</div>
            <div class="card-sub">${metaPct>=100?'✓ Meta batida!':meta?'em andamento':'sem meta definida'}</div>
          </div>
          <div class="card">
            <div class="card-bar bar-amber"></div>
            <div class="card-label">Investimento Meta Ads</div>
            <div class="card-value">${investimento ? fmt(investimento) : '—'}</div>
            <div class="card-sub">${investimento ? 'gasto em anúncios' : 'sem dados'}</div>
          </div>
          <div class="card">
            <div class="card-bar" style="background:linear-gradient(90deg,#06b6d4,#8b5cf6)"></div>
            <div class="card-label">ROAS</div>
            <div class="card-value" style="color:${roas>=3?'#00c875':roas>=1?'#f59e0b':'#f87171'}">${roas ? roas.toFixed(2)+'x' : '—'}</div>
            <div class="card-sub">${roas ? `R$ ${roas.toFixed(2)} de retorno por R$ 1` : 'sem dados'}</div>
          </div>
        </div>

        <!-- ── ROW 2: FUNNEL + GAUGE ── -->
        <div class="area-funnel">
          <div class="funnel-card">
            <div class="funnel-title">Taxa de Conversão por Etapa (Funil)</div>
            <div style="flex:1;display:flex;flex-direction:column;justify-content:space-between">
              <div class="funnel-row">
                <div class="funnel-shape-cell fl-1"><span class="funnel-num">${kpis.total}</span></div>
                <div class="funnel-label-cell"><div class="fl-label">Leads Totais</div><div class="fl-bar"><div class="fl-bar-fill" style="width:100%"></div></div></div>
              </div>
              <div class="funnel-conv-row"><div class="funnel-conv-cell"><div class="conv-pill">🎯 ${(c2ag*100).toFixed(1)}%</div></div><div></div></div>
              <div class="funnel-row">
                <div class="funnel-shape-cell fl-2"><span class="funnel-num">${kpis.agendadas}</span></div>
                <div class="funnel-label-cell"><div class="fl-label">Reuniões Agendadas</div><div class="fl-bar"><div class="fl-bar-fill" style="width:${Math.min(100,c2ag*100).toFixed(0)}%"></div></div></div>
              </div>
              <div class="funnel-conv-row"><div class="funnel-conv-cell"><div class="conv-pill">🎯 ${(c2real*100).toFixed(1)}%</div></div><div></div></div>
              <div class="funnel-row">
                <div class="funnel-shape-cell fl-3"><span class="funnel-num">${kpis.realizadas}</span></div>
                <div class="funnel-label-cell"><div class="fl-label">Reuniões Realizadas</div><div class="fl-bar"><div class="fl-bar-fill" style="width:${kpis.total?Math.min(100,kpis.realizadas/kpis.total*100).toFixed(0):0}%"></div></div></div>
              </div>
              <div class="funnel-conv-row"><div class="funnel-conv-cell"><div class="conv-pill">🎯 ${(c2fech*100).toFixed(1)}%</div></div><div></div></div>
              <div class="funnel-row">
                <div class="funnel-shape-cell fl-4"><span class="funnel-num">${kpis.fechados}</span></div>
                <div class="funnel-label-cell"><div class="fl-label">Fechamentos</div><div class="fl-bar"><div class="fl-bar-fill" style="width:${kpis.total?Math.min(100,kpis.fechados/kpis.total*100).toFixed(0):0}%"></div></div></div>
              </div>
            </div>
            <div class="funnel-footer">${totalConv}% conversão total</div>
          </div>
        </div>

        <!-- ── META × REALIZADO ── -->
        <div class="area-gauge" style="grid-column:3/5">
          <div class="gauge-card">
            <div class="gauge-title">Meta × Realizado — ${label}</div>
            <div class="gauge-svg-wrap">
              ${buildGaugeSVG(kpis.mrr, meta)}
              <div class="gauge-center-val">${fmt(kpis.mrr)}</div>
            </div>
            <div class="gauge-axis">
              <span>R$ 0</span>
              <span>${meta ? fmt(meta/2) : ''}</span>
              <span>${meta ? fmt(meta) : '—'}</span>
            </div>
            <div class="gauge-pct-val" style="color:${metaColor}">${meta ? metaPct.toFixed(1)+'%' : '—'}</div>
            <div class="gauge-pct-label">% da meta realizada</div>
            <div class="gauge-stats">
              <div class="gs"><div class="gs-val">${fmt(meta)}</div><div class="gs-lbl">Meta</div></div>
              <div class="gs"><div class="gs-val" style="color:${diff>=0?'#00c875':'#f87171'}">${diff>=0?'+':''}${fmt(diff)}</div><div class="gs-lbl">${diff>=0?'Acima':'Faltam'}</div></div>
              <div class="gs"><div class="gs-val">${kpis.closingCount}</div><div class="gs-lbl">Contratos</div></div>
            </div>
          </div>
        </div>

        <!-- ── ROW 3: CLOSERS + SDRS ── -->
        <div class="area-closers">
          <div class="table-card">
            <div class="table-header"><span>👤 Closers — ${label}</span></div>
            <div class="tbl-scroll">
              <table><thead><tr>
                <th>Closer</th><th class="num">Reuniões</th><th class="num">Fechados</th><th class="num">Conv.</th><th class="num">Valor Fechado</th>
              </tr></thead><tbody>
                ${closers.length ? closers.map(c=>`<tr>
                  <td class="name">${c.name}</td>
                  <td class="num">${c.reunioes}</td>
                  <td class="num">${c.fechados}</td>
                  <td class="num">${pctTag(c.fechados,c.reunioes)}</td>
                  <td class="num">${fmt(c.mrr)}</td>
                </tr>`).join('') : noData(5)}
              </tbody></table>
            </div>
          </div>
        </div>

        <div class="area-sdrs">
          ${buildPodium(sdrs, label)}
        </div>
      `;
    }

    // ════════════════════════════════════════════════════
    //  LOAD / STATE
    // ════════════════════════════════════════════════════
    function showLoading(msg='Carregando dados...') {
      document.getElementById('dashGrid').innerHTML = `
        <div class="kpi-row"><div class="state-wrap" style="grid-column:1/-1">
          <div class="loading-row"><div class="spinner"></div>${msg}</div>
        </div></div>`;
    }

    function showError(msg) {
      allItems=null; fechadoCache=null;
      document.getElementById('dashGrid').innerHTML=`
        <div class="kpi-row"><div class="state-wrap" style="grid-column:1/-1">
          <div class="error-box">❌ ${msg}</div>
        </div></div>`;
    }

    async function loadData() {
      const year  = parseInt(document.getElementById('yearSelect').value);
      const month = parseInt(document.getElementById('monthSelect').value);
      try {
        await Promise.all([fetchAllItems(), fetchInvestimentos()]);
        const leads        = getLeads(year, month);
        const agendaItems  = getAgendadas(year, month);
        const closings     = getClosingsFilter(year, month, closingFilter);
        const monthKey     = `${year}-${pad(month)}`;
        const investimento = investimentos[monthKey] || 0;
        renderDash(calcKPIs(leads,agendaItems,closings), calcClosers(agendaItems,closings), calcSDRs(agendaItems), year, month, investimento);
      } catch(err) {
        showError(`Erro ao buscar dados: ${err.message}`);
      }
    }

    // ════════════════════════════════════════════════════
    //  INIT
    // ════════════════════════════════════════════════════
    initSelectors();
    loadData();
  </script>
</body>
</html>
