<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Comercial</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:       #03050a;
      --surface:  rgba(10, 15, 30, 0.5);
      --surface-hover: rgba(15, 23, 42, 0.7);
      --border:   rgba(255, 255, 255, 0.05);
      --border2:  rgba(255, 255, 255, 0.1);
      --text-hi:  #ffffff;
      --text-md:  #94a3b8;
      --text-lo:  #475569;
      
      /* Scale Brand Colors */
      --scale-blue: #004ecc;
      --scale-blue-light: #2563eb;
      --scale-blue-glow: rgba(37, 99, 235, 0.4);
      --scale-orange: #d94a00;
      --scale-orange-light: #f97316;
      --scale-orange-glow: rgba(249, 115, 22, 0.4);

      /* Semantic Colors (Status) */
      --green:    #10b981;
      --green-glow: rgba(16, 185, 129, 0.4);
      --red:      #ef4444;
      --red-glow: rgba(239, 68, 68, 0.4);
      --gold:     #f59e0b;
      --gold-glow: rgba(245, 158, 11, 0.4);

      --radius:   clamp(12px, 1.5vw, 32px);
      --gap:      clamp(12px, 1.5vw, 32px);
      --pad:      clamp(16px, 2vw, 40px);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      background-image: 
        radial-gradient(circle at 10% 40%, rgba(37, 99, 235, 0.08), transparent 40%),
        radial-gradient(circle at 90% 60%, rgba(249, 115, 22, 0.06), transparent 40%);
      color: var(--text-hi);
      min-height: 100vh;
      padding: var(--pad);
      display: flex; flex-direction: column; gap: var(--gap);
    }

    /* ── DESKTOP: single screen ── */
    @media (min-width: 900px) {
      body { height: 100vh; overflow: hidden; }
    }

    /* ── TOP BAR ─── */
    .top-bar {
      display: flex; justify-content: space-between; align-items: center;
      flex-shrink: 0; gap: 16px; flex-wrap: wrap;
      background: rgba(10, 15, 30, 0.4);
      padding: clamp(12px, 1vw, 24px) var(--pad);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      backdrop-filter: blur(20px);
      box-shadow: 0 4px 30px rgba(0,0,0,0.3);
    }
    .top-bar .logo-img {
      height: clamp(28px, 3vh, 50px); width: auto; object-fit: contain;
      opacity: 0.95;
      filter: drop-shadow(0 2px 8px rgba(255,255,255,0.05));
    }
    .controls { display: flex; align-items: center; gap: clamp(8px, 1vw, 20px); flex-wrap: wrap; }
    .controls select {
      background: rgba(10, 15, 30, 0.6); border: 1px solid var(--border2); color: var(--text-hi);
      padding: clamp(6px, 0.8vw, 16px) clamp(12px, 1.2vw, 24px);
      border-radius: var(--radius); font-size: clamp(12px, 1.1vw, 24px);
      cursor: pointer; outline: none; transition: all .2s ease;
      backdrop-filter: blur(12px); font-weight: 500;
      appearance: none; -webkit-appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat; background-position: right clamp(8px, 1vw, 16px) center; background-size: clamp(12px, 1vw, 24px);
      padding-right: clamp(32px, 3vw, 56px);
    }
    .controls select:focus, .controls select:hover { border-color: var(--scale-blue-light); box-shadow: 0 0 16px var(--scale-blue-glow); background: rgba(15, 23, 42, 0.8); }
    .btn {
      border: none; padding: clamp(6px, 0.8vw, 16px) clamp(14px, 1.5vw, 32px);
      border-radius: var(--radius); cursor: pointer;
      font-size: clamp(12px, 1.1vw, 24px); font-weight: 700; transition: all .2s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex; align-items: center; gap: 8px;
    }
    .btn-refresh { 
      background: linear-gradient(135deg, rgba(37,99,235,0.2), rgba(0,78,204,0.2)); 
      color: #bfdbfe; border: 1px solid rgba(37,99,235,0.3); backdrop-filter: blur(12px); 
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
    }
    .btn-refresh:hover { 
      background: linear-gradient(135deg, rgba(37,99,235,0.3), rgba(0,78,204,0.3)); 
      box-shadow: 0 0 20px var(--scale-blue-glow), inset 0 1px 0 rgba(255,255,255,0.2); 
      transform: translateY(-2px); color: #fff;
    }

    /* ── MAIN GRID ─── */
    .dash-grid {
      flex: 1; display: grid; min-height: 0;
      grid-template-rows: auto 1fr 1fr;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: var(--gap);
    }
    .dash-grid .kpi-row { grid-column: 1/-1; display: grid; grid-template-columns: repeat(6,1fr); gap: var(--gap); }
    .area-funnel  { grid-column: 1/3; grid-row: 2; min-height: 0; overflow: hidden; }
    .area-gauge   { grid-column: 3/5; grid-row: 3; min-height: 0; overflow: hidden; }
    .area-closers { grid-column: 1/3; grid-row: 3; min-height: 0; overflow: hidden; }
    .area-sdrs    { grid-column: 3/5; grid-row: 2; min-height: 0; overflow: hidden; }

    /* ── RESPONSIVE ── */
    @media (max-width: 1200px) and (min-width: 600px) {
      .dash-grid { grid-template-rows: auto auto auto auto; grid-template-columns: 1fr 1fr; }
      .dash-grid .kpi-row { grid-template-columns: repeat(3,1fr); }
      .area-funnel  { grid-column: 1/2; grid-row: 2; }
      .area-gauge   { grid-column: 2/3; grid-row: 2; }
      .area-closers { grid-column: 1/3; grid-row: 3; }
      .area-sdrs    { grid-column: 1/3; grid-row: 4; }
    }
    @media (max-width: 599px) {
      .dash-grid { display: flex; flex-direction: column; }
      .dash-grid .kpi-row { grid-template-columns: repeat(2,1fr); }
      .area-funnel, .area-gauge, .area-closers, .area-sdrs { min-height: 320px; }
    }

    /* ── BASE CARDS (Glassmorphism) ─── */
    .card, .funnel-card, .gauge-card, .table-card, .podium-card, .state-wrap {
      background: var(--surface);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: var(--radius); padding: var(--pad);
      position: relative; overflow: hidden;
      display: flex; flex-direction: column; height: 100%;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s;
    }
    .card:hover, .funnel-card:hover, .table-card:hover, .podium-card:hover { 
      transform: translateY(-4px); 
      box-shadow: 0 12px 48px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.1); 
    }
    
    /* Neumorphic/Glowing Top Bars for Cards */
    .card-bar { position: absolute; top: 0; left: 0; right: 0; height: 4px; border-radius: var(--radius) var(--radius) 0 0; opacity: 0.9; }
    .bar-blue   { background: linear-gradient(90deg, var(--scale-blue), var(--scale-blue-light)); box-shadow: 0 2px 20px var(--scale-blue-glow); }
    .bar-orange { background: linear-gradient(90deg, var(--scale-orange), var(--scale-orange-light)); box-shadow: 0 2px 20px var(--scale-orange-glow); }

    .card-label, .funnel-title, .gauge-title, .table-header span, .podium-title {
      font-size: clamp(11px, 1vw, 22px); font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.5px;
      color: var(--text-md); margin-bottom: clamp(6px, 0.8vw, 16px);
      display: flex; align-items: center; gap: 8px;
    }
    .card-label { margin-top: 4px; }
    .card-value {
      font-size: clamp(24px, 2.5vw, 64px); font-weight: 800;
      color: var(--text-hi); line-height: 1.1; letter-spacing: -1px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }
    .card-sub { font-size: clamp(12px, 1vw, 20px); color: var(--text-lo); margin-top: clamp(4px, 0.5vw, 12px); font-weight: 500; }

    /* ── FUNNEL REDESIGN ─── */
    .funnel-card { padding: var(--pad); justify-content: space-between; }
    .funnel-title { text-align: center; justify-content: center; margin-bottom: clamp(12px, 1.5vw, 32px); color: var(--text-hi); }
    .funnel-row { display: grid; grid-template-columns: 50% 50%; align-items: center; position: relative; margin-bottom: clamp(4px, 0.5vw, 12px); }
    
    .funnel-shape-cell { 
      height: clamp(48px, 5vh, 90px); display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
      box-shadow: inset 0 2px 10px rgba(255,255,255,0.1), 0 4px 15px rgba(0,0,0,0.3);
      transition: all 0.3s;
    }
    .funnel-shape-cell::after {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 40%;
      background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, transparent 100%);
      pointer-events: none;
    }
    .funnel-shape-cell:hover { filter: brightness(1.1); transform: scale(1.02); z-index: 2; box-shadow: 0 8px 25px rgba(0,0,0,0.4); }

    /* Modern smooth clip-paths for the funnel - Monochromatic Scale Blue */
    .fl-1 { clip-path: polygon(0% 0%, 100% 0%, 94% 100%, 6% 100%);  background: linear-gradient(135deg, rgba(37,99,235,0.9), rgba(0,78,204,0.9)); border-radius: 4px 4px 8px 8px; }
    .fl-2 { clip-path: polygon(6% 0%, 94% 0%, 88% 100%, 12% 100%);  background: linear-gradient(135deg, rgba(29,78,216,0.9), rgba(30,58,138,0.9)); border-radius: 8px 8px 12px 12px; }
    .fl-3 { clip-path: polygon(12% 0%, 88% 0%, 82% 100%, 18% 100%); background: linear-gradient(135deg, rgba(30,58,138,0.9), rgba(15,23,42,0.9)); border-radius: 12px 12px 16px 16px; }
    .fl-4 { clip-path: polygon(18% 0%, 82% 0%, 76% 100%, 24% 100%); background: linear-gradient(135deg, rgba(249,115,22,0.9), rgba(194,65,12,0.9)); border-radius: 16px; }
    
    .funnel-num { font-size: clamp(20px, 2vw, 48px); font-weight: 900; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.5); z-index: 1; letter-spacing: -0.5px; }
    
    .funnel-conv-row { display: grid; grid-template-columns: 50% 50%; height: clamp(20px, 2vh, 40px); margin: -4px 0; z-index: 3; position: relative; }
    .funnel-conv-cell { display: flex; align-items: center; justify-content: center; }
    .conv-pill {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: clamp(11px, 1vw, 20px); font-weight: 800;
      color: #fff; background: rgba(10, 15, 30, 0.9);
      padding: clamp(4px, 0.5vw, 8px) clamp(12px, 1vw, 24px); border-radius: 30px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 4px 15px rgba(0,0,0,0.5), 0 0 15px var(--scale-orange-glow);
      backdrop-filter: blur(8px);
      transform: translateY(-50%);
    }
    
    .funnel-label-cell {
      display: flex; flex-direction: column; justify-content: center;
      padding: 0 0 0 clamp(16px, 1.5vw, 32px); border-left: 2px solid var(--border2);
      height: 100%; margin-left: clamp(8px, 1vw, 16px);
    }
    .fl-label { font-size: clamp(12px, 1.1vw, 24px); color: var(--text-hi); font-weight: 600; line-height: 1.3; }
    .fl-bar { height: clamp(4px, 0.5vw, 8px); background: rgba(0,0,0,0.3); border-radius: 4px; margin-top: clamp(8px, 1vw, 16px); width: 90%; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
    .fl-bar-fill { height: 100%; background: linear-gradient(90deg, var(--scale-blue-light), var(--scale-orange-light)); border-radius: 4px; box-shadow: 0 0 12px var(--scale-blue-glow); transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
    .funnel-footer { text-align: center; margin-top: auto; font-size: clamp(12px, 1.1vw, 22px); color: var(--text-md); font-weight: 600; padding-top: clamp(12px, 1.5vw, 24px); border-top: 1px solid var(--border); }

    /* ── GAUGE CARD ─── */
    .gauge-title { justify-content: center; color: var(--text-hi); }
    .gauge-svg-wrap { display: flex; justify-content: center; position: relative; flex-shrink: 0; filter: drop-shadow(0 4px 20px rgba(0,0,0,0.4)); margin: clamp(10px, 1vw, 20px) 0; }
    .gauge-center-val {
      position: absolute; bottom: 5%; left: 50%; transform: translateX(-50%);
      font-size: clamp(18px, 1.8vw, 42px); font-weight: 800;
      color: var(--text-hi); white-space: nowrap;
      text-shadow: 0 2px 15px rgba(0,0,0,0.5);
    }
    .gauge-axis { display: flex; justify-content: space-between; padding: 0 clamp(10px, 1vw, 24px); font-size: clamp(10px, 0.9vw, 20px); color: var(--text-md); font-weight: 600; }
    .gauge-pct-val { font-size: clamp(32px, 3.5vw, 80px); font-weight: 900; text-align: center; margin-top: auto; letter-spacing: -1px; text-shadow: 0 4px 20px rgba(0,0,0,0.5); }
    .gauge-pct-label { font-size: clamp(11px, 1vw, 22px); color: var(--text-md); text-align: center; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; margin-bottom: clamp(10px, 1vw, 20px); }
    .gauge-stats { display: flex; justify-content: space-around; margin-top: clamp(12px, 1vw, 24px); padding-top: clamp(12px, 1vw, 24px); border-top: 1px solid var(--border); }
    .gs { text-align: center; }
    .gs-val { font-size: clamp(14px, 1.2vw, 28px); font-weight: 800; color: var(--text-hi); }
    .gs-lbl { font-size: clamp(10px, 0.9vw, 18px); color: var(--text-lo); margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }

    /* ── TABLE CARDS ─── */
    .table-card { padding: 0; }
    .table-header { padding: clamp(12px, 1.5vw, 32px); border-bottom: 1px solid var(--border); flex-shrink: 0; background: rgba(0,0,0,0.2); }
    .table-header span { margin-bottom: 0; color: var(--text-hi); }
    .tbl-scroll { overflow-y: auto; flex: 1; padding: 0 clamp(8px, 1vw, 24px) clamp(16px, 2vw, 32px); }
    .tbl-scroll::-webkit-scrollbar { width: 6px; }
    .tbl-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
    .tbl-scroll::-webkit-scrollbar-track { background: transparent; }
    
    table { width: 100%; border-collapse: separate; border-spacing: 0; }
    thead th {
      padding: clamp(10px, 1vw, 24px) clamp(12px, 1.2vw, 32px);
      font-size: clamp(11px, 1vw, 20px); font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px;
      color: var(--text-md); background: var(--surface);
      text-align: left; white-space: nowrap; position: sticky; top: 0; z-index: 10;
      border-bottom: 1px solid var(--border2);
      backdrop-filter: blur(12px);
    }
    thead th.num { text-align: right; }
    tbody tr { transition: background .2s, transform .2s; }
    tbody tr td { border-bottom: 1px solid rgba(255,255,255,0.03); }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.05); transform: scale(1.01); }
    tbody td {
      padding: clamp(12px, 1.2vw, 28px) clamp(12px, 1.2vw, 32px);
      font-size: clamp(13px, 1.1vw, 26px); color: var(--text-md); white-space: nowrap;
      font-weight: 500;
    }
    tbody td.num { text-align: right; color: var(--text-hi); font-weight: 700; font-variant-numeric: tabular-nums; }
    tbody td.name { font-weight: 700; color: var(--text-hi); }
    
    .tag-pct { 
      display: inline-block; padding: clamp(4px, 0.5vw, 8px) clamp(10px, 1vw, 20px); 
      border-radius: 30px; font-size: clamp(11px, 1vw, 22px); font-weight: 800; 
      border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(4px);
    }
    .tag-green { background: rgba(16,185,129,0.15); color: var(--green); box-shadow: 0 0 15px var(--green-glow); }
    .tag-blue  { background: rgba(37,99,235,0.15); color: #60a5fa; box-shadow: 0 0 15px var(--scale-blue-glow); }
    .tag-red   { background: rgba(239,68,68,0.15); color: #f87171; box-shadow: 0 0 15px var(--red-glow); }

    /* ── PODIUM ─── */
    .podium-title { justify-content: center; color: var(--text-hi); margin-bottom: clamp(20px, 2vw, 40px); }
    .podium-stage { display: flex; align-items: flex-end; justify-content: center; gap: clamp(16px, 2vw, 60px); flex: 1; }
    .podium-slot { display: flex; flex-direction: column; align-items: center; gap: clamp(10px, 1vw, 24px); position: relative; }
    .podium-slot.p1 { order: 2; z-index: 3; }
    .podium-slot.p2 { order: 1; z-index: 2; }
    .podium-slot.p3 { order: 3; z-index: 1; }
    
    .podium-avatar {
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-weight: 800; color: #fff; flex-shrink: 0; border: 4px solid var(--border2);
      background: var(--surface); backdrop-filter: blur(8px); position: relative;
    }
    .p1 .podium-avatar { 
      width: clamp(80px, 8vw, 160px); height: clamp(80px, 8vw, 160px); font-size: clamp(32px, 3.5vw, 64px); 
      border-color: var(--gold); box-shadow: 0 0 30px var(--gold-glow), inset 0 0 20px rgba(245,158,11,0.3); 
    }
    .p2 .podium-avatar { 
      width: clamp(64px, 6vw, 120px); height: clamp(64px, 6vw, 120px); font-size: clamp(24px, 2.5vw, 48px); 
      border-color: #cbd5e1; box-shadow: 0 0 20px rgba(203,213,225,0.4); 
    }
    .p3 .podium-avatar { 
      width: clamp(64px, 6vw, 120px); height: clamp(64px, 6vw, 120px); font-size: clamp(24px, 2.5vw, 48px); 
      border-color: #b45309; box-shadow: 0 0 20px rgba(180,83,9,0.4); 
    }
    
    .podium-crown { 
      position: absolute; top: clamp(-30px, -3vw, -60px); font-size: clamp(32px, 3.5vw, 70px); 
      line-height: 1; filter: drop-shadow(0 4px 15px rgba(245,158,11,0.6)); animation: float 3s ease-in-out infinite; 
    }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    
    .podium-name { font-size: clamp(16px, 1.5vw, 36px); font-weight: 800; color: var(--text-hi); text-align: center; max-width: clamp(100px, 10vw, 200px); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-shadow: 0 2px 8px rgba(0,0,0,0.5); }
    .podium-pct { font-size: clamp(24px, 2.5vw, 56px); font-weight: 900; text-align: center; letter-spacing: -1px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
    .podium-sub { font-size: clamp(12px, 1.1vw, 24px); color: var(--text-md); text-align: center; font-weight: 600; }
    
    .podium-block { 
      border-radius: 16px 16px 0 0; display: flex; align-items: flex-start; justify-content: center; 
      padding-top: clamp(12px, 1vw, 24px);
      font-size: clamp(24px, 2.5vw, 50px); font-weight: 900; color: rgba(255,255,255,0.9); 
      position: relative; overflow: hidden; backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-bottom: none;
    }
    .podium-block::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 50%; background: linear-gradient(180deg, rgba(255,255,255,0.15), transparent); pointer-events: none; }
    .p1 .podium-block { width: clamp(110px, 11vw, 220px); height: clamp(80px, 8vh, 160px); background: linear-gradient(180deg, rgba(245,158,11,0.4), rgba(245,158,11,0.05)); box-shadow: 0 -4px 30px rgba(245,158,11,0.3), inset 0 2px 10px rgba(255,255,255,0.2); border-color: rgba(245,158,11,0.5); color: #fcd34d; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
    .p2 .podium-block { width: clamp(96px, 9.5vw, 190px); height: clamp(60px, 6vh, 120px); background: linear-gradient(180deg, rgba(203,213,225,0.3), rgba(203,213,225,0.05)); box-shadow: 0 -4px 20px rgba(203,213,225,0.2), inset 0 2px 10px rgba(255,255,255,0.2); border-color: rgba(203,213,225,0.4); color: #f1f5f9; text-shadow: 0 2px 10px rgba(0,0,0,0.5);}
    .p3 .podium-block { width: clamp(96px, 9.5vw, 190px); height: clamp(40px, 4vh, 80px); background: linear-gradient(180deg, rgba(180,83,9,0.3), rgba(180,83,9,0.05)); box-shadow: 0 -4px 20px rgba(180,83,9,0.15), inset 0 2px 10px rgba(255,255,255,0.1); border-color: rgba(180,83,9,0.4); color: #fdba74; text-shadow: 0 2px 10px rgba(0,0,0,0.5);}

    /* ── FILTER TABS ─── */
    .filter-tabs { display: flex; gap: clamp(6px, 0.8vw, 12px); align-items: center; flex-wrap: wrap; }
    .ftab {
      border: 1px solid var(--border); background: rgba(0,0,0,0.3); color: var(--text-md);
      padding: clamp(6px, 0.8vw, 14px) clamp(14px, 1.5vw, 28px); border-radius: 30px;
      font-size: clamp(11px, 1vw, 22px); font-weight: 600;
      cursor: pointer; transition: all .3s cubic-bezier(0.4, 0, 0.2, 1); white-space: nowrap;
      backdrop-filter: blur(8px);
    }
    .ftab:hover { border-color: rgba(255,255,255,0.3); color: #fff; background: rgba(255,255,255,0.05); }
    .ftab.active { 
      background: linear-gradient(135deg, rgba(37,99,235,0.2), rgba(0,78,204,0.2)); 
      border-color: var(--scale-blue-light); color: #fff; 
      box-shadow: 0 0 20px var(--scale-blue-glow), inset 0 1px 0 rgba(255,255,255,0.2); 
    }
    .filter-label { font-size: clamp(11px, 1vw, 22px); color: var(--text-md); font-weight: 600; }
    .date-range { display: flex; align-items: center; gap: clamp(6px, 0.8vw, 12px); animation: fadeIn .3s ease-out; }
    .date-range input[type=date] {
      background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: var(--text-hi);
      padding: clamp(4px, 0.6vw, 12px) clamp(10px, 1vw, 20px); border-radius: 8px; font-size: clamp(11px, 1vw, 22px);
      outline: none; cursor: pointer; color-scheme: dark; transition: all .2s;
    }
    .date-range input[type=date]:focus, .date-range input[type=date]:hover { border-color: var(--scale-blue-light); box-shadow: 0 0 12px var(--scale-blue-glow); background: rgba(15,23,42,0.6); }
    .date-range span { font-size: clamp(10px, 0.9vw, 20px); color: var(--text-lo); font-weight: 500; }
    @keyframes fadeIn { from { opacity:0; transform: translateX(-10px); } to { opacity:1; transform: translateX(0); } }

    /* ── INLINE EDIT META ── */
    .meta-editable {
      cursor: text; border-radius: 8px; transition: all .2s;
      padding: 4px 8px; margin: -4px -8px; border: 1px solid transparent;
    }
    .meta-editable:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); }
    .meta-inline-input {
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--scale-blue-light); border-radius: 8px;
      color: var(--text-hi);
      font-size: clamp(24px, 2.5vw, 64px); font-weight: 800;
      font-family: inherit; letter-spacing: -1px; line-height: 1.1;
      outline: none; width: 100%;
      padding: 4px 8px; margin: -4px -8px;
      box-shadow: 0 0 15px var(--scale-blue-glow);
    }
    .meta-hint { font-size: clamp(10px, 0.9vw, 18px); color: var(--scale-blue-light); margin-top: 6px; font-weight: 600; opacity: 0.9; }

    /* ── STATE ─── */
    .state-wrap { justify-content: center; align-items: center; }
    .loading-row { display: flex; align-items: center; gap: clamp(12px, 1vw, 24px); color: var(--text-md); font-size: clamp(14px, 1.2vw, 28px); font-weight: 600; }
    .spinner { width: clamp(24px, 2vw, 48px); height: clamp(24px, 2vw, 48px); border: 3px solid var(--border); border-top-color: var(--scale-blue-light); border-radius: 50%; animation: spin .8s cubic-bezier(0.4, 0, 0.2, 1) infinite; flex-shrink: 0; box-shadow: 0 0 15px var(--scale-blue-glow); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-box { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: var(--radius); padding: clamp(16px, 1.5vw, 32px); color: #fca5a5; font-size: clamp(14px, 1.2vw, 28px); line-height: 1.6; font-weight: 500; box-shadow: 0 0 20px var(--red-glow); }
    .hint-text { color: var(--text-lo); font-size: clamp(12px, 1vw, 24px); }

  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="top-bar">
    <img src="scale-logo.svg" alt="Scale Company" class="logo-img">
    <div class="controls">
      <div class="filter-tabs">
        <span class="filter-label">Fechamentos:</span>
        <button class="ftab active" id="ftab-all"    onclick="setFilter('all')">Todos</button>
        <button class="ftab"        id="ftab-mesmo"  onclick="setFilter('mesmo_mes')">Leads do mês</button>
        <button class="ftab"        id="ftab-outros" onclick="setFilter('outros_meses')">Leads de outros meses</button>
        <div class="date-range" id="dateRangeWrap" style="display:none">
          <span>entrada de</span>
          <input type="date" id="dateFrom" onchange="loadData()">
          <span>até</span>
          <input type="date" id="dateTo" onchange="loadData()">
        </div>
      </div>
      <select id="monthSelect"></select>
      <select id="yearSelect"></select>
      <button class="btn btn-refresh" onclick="reload()">↻ Atualizar</button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="dash-grid" id="dashGrid">
    <div class="kpi-row"><div class="state-wrap" style="grid-column:1/-1"><div class="loading-row"><div class="spinner"></div>Carregando dados...</div></div></div>
  </div>

  <script>
    // ════════════════════════════════════════════════════
    //  CONFIG
    // ════════════════════════════════════════════════════
    const BOARD_ID   = '9613941689';
    const MONDAY_URL = '/api/monday';
    const SHEETS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSlckOQ4Er4jS7SnS2aZwGdnSsifKZCbwmf1JdVLsVGXMsWNjUDabpk4o_dsuWRBG013pzFEFoDl-U_/pub?gid=0&single=true&output=csv';

    // Monthly goals (Ano-Mês: valor) — defaults, sobrescrito por localStorage
    const METAS_DEFAULT = {
      '2025-11': 50000,  '2025-12': 35000,
      '2026-01': 50000,  '2026-02': 45000,
      '2026-03': 50000,  '2026-04': 60000,
      '2026-05': 70000,  '2026-06': 80000,
      '2026-07': 90000,  '2026-08': 1000000,
      '2026-09': 1100000,'2026-10': 1200000,
      '2026-11': 1300000,'2026-12': 1400000,
    };

    function getMeta(monthKey) {
      try {
        const overrides = JSON.parse(localStorage.getItem('metas_override') || '{}');
        return overrides[monthKey] ?? METAS_DEFAULT[monthKey] ?? 0;
      } catch { return METAS_DEFAULT[monthKey] ?? 0; }
    }

    const COL = {
      etapa    : 'color_mksyb52r',
      mrr      : 'numeric_mksykxx',
      dtFecha  : 'date_mksyxsgr',
      dtEntrada: 'data',
      dtAgenda : 'date_mkt23t3n',
      closer   : 'dropdown_mkt2ehgd',
      sdr      : 'dropdown_mkt2jm28',
    };

    const ETAPA_REALIZADA = new Set(['R1 Realizada','R2 Agendado','Follow Up','Proposta em Análise','Fechado','Perdido Closer','Contato Futuro','Desqualificado']);
    const ETAPA_AGENDADA  = new Set(['Agendadas','No-Show','R1 Realizada','R2 Agendado','Follow Up','Proposta em Análise','Fechado','Perdido Closer','Contato Futuro','Desqualificado']);

    // ════════════════════════════════════════════════════
    //  STATE
    // ════════════════════════════════════════════════════
    let allItems       = null;
    let fechadoCache   = null;
    let investimentos  = {};
    let closingFilter  = 'all';

    // ════════════════════════════════════════════════════
    //  SELECTORS
    // ════════════════════════════════════════════════════
    const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

    function initSelectors() {
      const now  = new Date();
      const mSel = document.getElementById('monthSelect');
      const ySel = document.getElementById('yearSelect');
      MONTHS.forEach((m, i) => {
        const o = document.createElement('option');
        o.value = i + 1; o.textContent = m;
        if (i === now.getMonth()) o.selected = true;
        mSel.appendChild(o);
      });
      for (let y = now.getFullYear(); y >= 2025; y--) {
        const o = document.createElement('option');
        o.value = y; o.textContent = y;
        if (y === now.getFullYear()) o.selected = true;
        ySel.appendChild(o);
      }
      mSel.addEventListener('change', loadData);
      ySel.addEventListener('change', loadData);
    }

    // ════════════════════════════════════════════════════
    //  TOKEN
    // ════════════════════════════════════════════════════
    function reload() { allItems = null; fechadoCache = null; loadData(); }
    function setFilter(f) {
      closingFilter = f;
      ['all','mesmo','outros'].forEach(k => document.getElementById('ftab-'+k)?.classList.remove('active'));
      document.getElementById('ftab-'+(f==='all'?'all':f==='mesmo_mes'?'mesmo':'outros'))?.classList.add('active');
      document.getElementById('dateRangeWrap').style.display = f==='outros_meses' ? 'flex' : 'none';
      loadData();
    }

    // ════════════════════════════════════════════════════
    //  HELPERS
    // ════════════════════════════════════════════════════
    const pad = n => String(n).padStart(2,'0');

    function colVal(item, id) {
      const c = item.column_values?.find(c => c.id === id);
      return c?.text || null;
    }
    function dateMonth(s) {
      if (!s) return null;
      const d = new Date(s + 'T12:00:00Z');
      return `${d.getUTCFullYear()}-${pad(d.getUTCMonth()+1)}`;
    }
    function fmt(v) {
      return new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL',minimumFractionDigits:0,maximumFractionDigits:0}).format(v||0);
    }
    function pctTag(num, den) {
      if (!den) return '<span class="tag-pct tag-blue">—</span>';
      const p = num/den*100;
      const cls = p>=50?'tag-green':p>=20?'tag-blue':'tag-red';
      return `<span class="tag-pct ${cls}">${p.toFixed(1)}%</span>`;
    }

    // ════════════════════════════════════════════════════
    //  GOOGLE SHEETS — INVESTIMENTO
    // ════════════════════════════════════════════════════
    async function fetchInvestimentos() {
      try {
        const res  = await fetch(SHEETS_URL);
        const text = await res.text();
        const rows = text.trim().split('\n').slice(1); // skip header
        rows.forEach(row => {
          const [mes, valor] = row.split(',');
          if (mes && valor) investimentos[mes.trim()] = parseFloat(valor.trim()) || 0;
        });
      } catch(e) { /* silently ignore — investimento ficará 0 */ }
    }

    // ════════════════════════════════════════════════════
    //  GAUGE SVG
    // ════════════════════════════════════════════════════
    function buildGaugeSVG(mrr, meta) {
      const W=190, H=105, cx=95, cy=100, r=78;
      const pct    = meta > 0 ? Math.min(mrr/meta, 1.0) : 0;
      const color  = !meta ? '#334155' : mrr>=meta ? '#10b981' : mrr/meta>=0.7 ? '#f59e0b' : '#2563eb';
      const bgPath = `M ${cx-r},${cy} A ${r},${r} 0 0,1 ${cx+r},${cy}`;
      const glowId = `glow_${Math.random().toString(36).slice(2,7)}`;
      let fill = '';
      if (pct > 0.005) {
        const eX = (cx - r * Math.cos(pct * Math.PI)).toFixed(2);
        const eY = (cy - r * Math.sin(pct * Math.PI)).toFixed(2);
        fill = `<path d="M ${cx-r},${cy} A ${r},${r} 0 0,1 ${eX},${eY}" fill="none" stroke="${color}" stroke-width="13" stroke-linecap="round" filter="url(#${glowId})"/>`;
      }
      return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="overflow:visible">
        <defs>
          <filter id="${glowId}" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <path d="${bgPath}" fill="none" stroke="#162035" stroke-width="13" stroke-linecap="round"/>
        ${fill}
      </svg>`;
    }

    // ════════════════════════════════════════════════════
    //  API
    // ════════════════════════════════════════════════════
    const COLS_LIST = [COL.etapa,COL.mrr,COL.dtFecha,COL.dtEntrada,COL.dtAgenda,COL.closer,COL.sdr].map(c=>`"${c}"`).join(',');

    async function gql(query) {
      const res = await fetch(MONDAY_URL,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({query})
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      if (json.errors) throw new Error(json.errors[0].message);
      return json.data;
    }

    async function fetchAllItems() {
      if (allItems) return allItems;
      let all=[], cursor=null;
      do {
        showLoading(`Carregando dados... ${all.length} itens`);
        const cp = cursor ? `, cursor: "${cursor}"` : '';
        const data = await gql(`{ boards(ids:[${BOARD_ID}]) { items_page(limit:200 ${cp}) { cursor items { id name column_values(ids:[${COLS_LIST}]) { id text } } } } }`);
        const page = data.boards[0].items_page;
        all = all.concat(page.items);
        cursor = page.cursor;
      } while (cursor);
      allItems     = all;
      fechadoCache = all.filter(i => colVal(i, COL.etapa) === 'Fechado');
      return all;
    }

    function getLeads(year, month) {
      const key = `${year}-${pad(month)}`;
      return (allItems||[]).filter(i => dateMonth(colVal(i,COL.dtEntrada)) === key);
    }
    const ETAPA_EXCLUIDA_AGENDA = new Set(['Em Aberto','Perdido SDR']);
    function getAgendadas(year, month) {
      const key = `${year}-${pad(month)}`;
      return (allItems||[]).filter(i =>
        dateMonth(colVal(i,COL.dtAgenda)) === key &&
        !ETAPA_EXCLUIDA_AGENDA.has(colVal(i,COL.etapa))
      );
    }
    function getClosings(year, month) {
      const key = `${year}-${pad(month)}`;
      return (fechadoCache||[]).filter(i => dateMonth(colVal(i,COL.dtFecha)) === key);
    }
    // Closings filtrado por origem do lead
    function getClosingsFilter(year, month, filter) {
      const closings = getClosings(year, month);
      const key = `${year}-${pad(month)}`;
      if (filter === 'mesmo_mes') return closings.filter(i => dateMonth(colVal(i,COL.dtEntrada)) === key);
      if (filter === 'outros_meses') {
        const from = document.getElementById('dateFrom')?.value;
        const to   = document.getElementById('dateTo')?.value;
        return closings.filter(i => {
          const entrada = colVal(i, COL.dtEntrada);
          if (!entrada) return false;
          if (dateMonth(entrada) === key) return false; // exclui leads do próprio mês
          if (from && entrada < from) return false;
          if (to   && entrada > to)   return false;
          return true;
        });
      }
      return closings;
    }

    // ════════════════════════════════════════════════════
    //  METRICS
    // ════════════════════════════════════════════════════
    function calcKPIs(leads, agendaItems, closings) {
      let mrr=0, closingCount=0;
      closings.forEach(i => { const v=parseFloat(colVal(i,COL.mrr)); if(v>0){mrr+=v;closingCount++;} });
      const total      = leads.length;
      const agendadas  = agendaItems.length;
      const realizadas = agendaItems.filter(i => ETAPA_REALIZADA.has(colVal(i,COL.etapa))).length;
      const fechados   = closings.length;
      return { mrr, closingCount, ticketMedio: closingCount?mrr/closingCount:0, total, agendadas, realizadas, fechados };
    }

    function calcClosers(agendaItems, closings) {
      const map = new Map();
      agendaItems.forEach(i => {
        const name=colVal(i,COL.closer); if(!name||name==='Nenhum'||name==='CS') return;
        if(!ETAPA_REALIZADA.has(colVal(i,COL.etapa))) return;
        if(!map.has(name)) map.set(name,{name,reunioes:0,fechados:0,mrr:0});
        map.get(name).reunioes++;
      });
      closings.forEach(i => {
        const name=colVal(i,COL.closer); if(!name||name==='Nenhum'||name==='CS') return;
        if(!map.has(name)) map.set(name,{name,reunioes:0,fechados:0,mrr:0});
        const v=parseFloat(colVal(i,COL.mrr))||0;
        map.get(name).fechados++; map.get(name).mrr+=v;
      });
      return [...map.values()].sort((a,b)=>b.mrr-a.mrr);
    }

    function calcSDRs(agendaItems) {
      const map = new Map();
      agendaItems.forEach(i => {
        const name=colVal(i,COL.sdr); if(!name) return;
        if(!map.has(name)) map.set(name,{name,agendadas:0,feitas:0});
        map.get(name).agendadas++;
        if(ETAPA_REALIZADA.has(colVal(i,COL.etapa))) map.get(name).feitas++;
      });
      return [...map.values()].filter(s=>s.agendadas>0).sort((a,b)=>b.agendadas-a.agendadas);
    }

    // ════════════════════════════════════════════════════
    //  PODIUM
    // ════════════════════════════════════════════════════
    const PODIUM_COLORS = ['#2563eb', '#f97316', '#004ecc', '#d94a00'];
    const SDR_PHOTOS = { 'josé': 'jose.jpg', 'jose': 'jose.jpg', 'henrique': 'henrique.jpg' };

    function initials(name) {
      return name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    }

    function buildPodiumSlot(sdr, rank, colorIdx) {
      if (!sdr) return `<div class="podium-slot p${rank}"><div class="podium-block">—</div></div>`;
      const color    = PODIUM_COLORS[colorIdx % PODIUM_COLORS.length];
      const pct      = sdr.agendadas ? (sdr.feitas/sdr.agendadas*100).toFixed(1) : '0.0';
      const pctColor = parseFloat(pct)>=60?'#10b981':parseFloat(pct)>=40?'#f59e0b':'#ef4444';
      const crown    = rank===1 ? `<div class="podium-crown">👑</div>` : '';
      const photo    = SDR_PHOTOS[sdr.name.toLowerCase().split(' ')[0]];
      const avatar   = photo
        ? `<div class="podium-avatar" style="background:#0b1120;padding:0;overflow:hidden"><img src="${photo}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"></div>`
        : `<div class="podium-avatar" style="background:${color}">${initials(sdr.name)}</div>`;
      return `
        <div class="podium-slot p${rank}">
          ${crown}
          ${avatar}
          <div class="podium-name">${sdr.name.split(' ')[0]}</div>
          <div class="podium-pct" style="color:${pctColor}">${pct}%</div>
          <div class="podium-sub">${sdr.feitas} de ${sdr.agendadas} ag.</div>
          <div class="podium-block">${rank}º</div>
        </div>`;
    }

    function buildPodium(sdrs, label) {
      const sorted = [...sdrs].sort((a,b) => (b.agendadas+b.feitas) - (a.agendadas+a.feitas));
      const [s1, s2, s3] = [sorted[0], sorted[1], sorted[2]];
      return `
        <div class="podium-card">
          <div class="podium-title">🏆 Ranking SDRs — ${label}</div>
          <div class="podium-stage">
            ${buildPodiumSlot(s2, 2, 1)}
            ${buildPodiumSlot(s1, 1, 0)}
            ${buildPodiumSlot(s3, 3, 2)}
          </div>
        </div>`;
    }

    // ════════════════════════════════════════════════════
    //  RENDER
    // ════════════════════════════════════════════════════
    function renderDash(kpis, closers, sdrs, year, month, investimento, closings) {
      const label    = `${MONTHS[month-1]} ${year}`;
      const monthKey = `${year}-${pad(month)}`;
      const meta     = getMeta(monthKey);
      const metaPct  = meta > 0 ? kpis.mrr/meta*100 : 0;
      const metaColor= !meta ? '#64748b' : metaPct>=100 ? '#10b981' : metaPct>=70 ? '#f59e0b' : '#2563eb';
      const diff     = kpis.mrr - meta;
      const roas     = investimento > 0 ? (kpis.mrr / investimento) : 0;

      const c2ag   = kpis.total     ? kpis.agendadas /kpis.total     : 0;
      const c2real = kpis.agendadas ? kpis.realizadas/kpis.agendadas  : 0;
      const c2fech = kpis.realizadas? kpis.fechados  /kpis.realizadas : 0;
      const totalConv = kpis.total ? (kpis.fechados/kpis.total*100).toFixed(1) : 0;

      const noData = s => `<tr><td colspan="${s}" style="padding:12px;color:#475569;font-size:12px">Sem dados para este mês</td></tr>`;

      document.getElementById('dashGrid').innerHTML = `

        <!-- ── ROW 1: KPIs ── -->
        <div class="kpi-row">
          <div class="card">
            <div class="card-bar bar-blue"></div>
            <div class="card-label">MRR — ${label}</div>
            <div class="card-value">${fmt(kpis.mrr)}</div>
            <div class="card-sub">${kpis.closingCount} contratos fechados</div>
          </div>
          <div class="card">
            <div class="card-bar bar-blue"></div>
            <div class="card-label">Ticket Médio</div>
            <div class="card-value">${fmt(kpis.ticketMedio)}</div>
            <div class="card-sub">por contrato</div>
          </div>
          <div class="card">
            <div class="card-bar bar-orange"></div>
            <div class="card-label">Meta do Mês</div>
            <div class="card-value meta-editable" id="meta-val" onclick="startInlineEdit('${monthKey}',${meta})">${meta ? fmt(meta) : '—'}</div>
            <div class="card-sub" id="meta-sub">clique para editar</div>
          </div>
          <div class="card">
            <div class="card-bar" style="background:${metaColor}"></div>
            <div class="card-label">% da Meta Realizada</div>
            <div class="card-value" style="color:${metaColor}">${meta ? metaPct.toFixed(1)+'%' : '—'}</div>
            <div class="card-sub">${metaPct>=100?'✓ Meta batida!':meta?'em andamento':'sem meta definida'}</div>
          </div>
          <div class="card">
            <div class="card-bar bar-orange"></div>
            <div class="card-label">Investimento Meta Ads</div>
            <div class="card-value">${investimento ? fmt(investimento) : '—'}</div>
            <div class="card-sub">${investimento ? 'gasto em anúncios' : 'sem dados'}</div>
          </div>
          <div class="card">
            <div class="card-bar bar-blue"></div>
            <div class="card-label">ROAS</div>
            <div class="card-value" style="color:${roas>=3?'#00c875':roas>=1?'#f59e0b':'#f87171'}">${roas ? roas.toFixed(2)+'x' : '—'}</div>
            <div class="card-sub">${roas ? `R$ ${roas.toFixed(2)} de retorno por R$ 1` : 'sem dados'}</div>
          </div>
        </div>

        <!-- ── ROW 2: FUNNEL + GAUGE ── -->
        <div class="area-funnel">
          <div class="funnel-card">
            <div class="funnel-title">Taxa de Conversão por Etapa (Funil)</div>
            <div style="flex:1;display:flex;flex-direction:column;justify-content:space-between">
              <div class="funnel-row">
                <div class="funnel-shape-cell fl-1"><span class="funnel-num">${kpis.total}</span></div>
                <div class="funnel-label-cell"><div class="fl-label">Leads Totais</div><div class="fl-bar"><div class="fl-bar-fill" style="width:100%"></div></div></div>
              </div>
              <div class="funnel-conv-row"><div class="funnel-conv-cell"><div class="conv-pill">🎯 ${(c2ag*100).toFixed(1)}%</div></div><div></div></div>
              <div class="funnel-row">
                <div class="funnel-shape-cell fl-2"><span class="funnel-num">${kpis.agendadas}</span></div>
                <div class="funnel-label-cell"><div class="fl-label">Reuniões Agendadas</div><div class="fl-bar"><div class="fl-bar-fill" style="width:${Math.min(100,c2ag*100).toFixed(0)}%"></div></div></div>
              </div>
              <div class="funnel-conv-row"><div class="funnel-conv-cell"><div class="conv-pill">🎯 ${(c2real*100).toFixed(1)}%</div></div><div></div></div>
              <div class="funnel-row">
                <div class="funnel-shape-cell fl-3"><span class="funnel-num">${kpis.realizadas}</span></div>
                <div class="funnel-label-cell"><div class="fl-label">Reuniões Realizadas</div><div class="fl-bar"><div class="fl-bar-fill" style="width:${kpis.total?Math.min(100,kpis.realizadas/kpis.total*100).toFixed(0):0}%"></div></div></div>
              </div>
              <div class="funnel-conv-row"><div class="funnel-conv-cell"><div class="conv-pill">🎯 ${(c2fech*100).toFixed(1)}%</div></div><div></div></div>
              <div class="funnel-row">
                <div class="funnel-shape-cell fl-4"><span class="funnel-num">${kpis.fechados}</span></div>
                <div class="funnel-label-cell"><div class="fl-label">Fechamentos</div><div class="fl-bar"><div class="fl-bar-fill" style="width:${kpis.total?Math.min(100,kpis.fechados/kpis.total*100).toFixed(0):0}%"></div></div></div>
              </div>
            </div>
            <div class="funnel-footer">${totalConv}% conversão total</div>
          </div>
        </div>

        <!-- ── CLIENTES FECHADOS ── -->
        <div class="area-gauge" style="grid-column:3/5">
          <div class="table-card">
            <div class="table-header"><span>✅ Clientes Fechados — ${label}</span></div>
            <div class="tbl-scroll">
              <table><thead><tr>
                <th>Cliente</th><th>Closer</th><th class="num">Data</th><th class="num">Valor</th>
              </tr></thead><tbody>
                ${(closings||[]).length ? [...(closings||[])].sort((a,b)=>{
                    const da = colVal(a,COL.dtFecha)||''; const db = colVal(b,COL.dtFecha)||'';
                    return db.localeCompare(da);
                  }).map(i => {
                    const nome   = i.name || '—';
                    const closer = colVal(i,COL.closer) || '—';
                    const valor  = parseFloat(colVal(i,COL.mrr)) || 0;
                    const data   = colVal(i,COL.dtFecha);
                    const dataFmt = data ? data.split('-').reverse().join('/').slice(0,5) : '—';
                    return `<tr>
                      <td class="name">${nome}</td>
                      <td>${closer}</td>
                      <td class="num">${dataFmt}</td>
                      <td class="num">${fmt(valor)}</td>
                    </tr>`;
                  }).join('') : noData(4)}
              </tbody></table>
            </div>
          </div>
        </div>

        <!-- ── ROW 3: CLOSERS + SDRS ── -->
        <div class="area-closers">
          <div class="table-card">
            <div class="table-header"><span>👤 Closers — ${label}</span></div>
            <div class="tbl-scroll">
              <table><thead><tr>
                <th>Closer</th><th class="num">Reuniões</th><th class="num">Fechados</th><th class="num">Conv.</th><th class="num">Valor Fechado</th>
              </tr></thead><tbody>
                ${closers.length ? closers.map(c=>`<tr>
                  <td class="name">${c.name}</td>
                  <td class="num">${c.reunioes}</td>
                  <td class="num">${c.fechados}</td>
                  <td class="num">${pctTag(c.fechados,c.reunioes)}</td>
                  <td class="num">${fmt(c.mrr)}</td>
                </tr>`).join('') : noData(5)}
              </tbody></table>
            </div>
          </div>
        </div>

        <div class="area-sdrs">
          ${buildPodium(sdrs, label)}
        </div>
      `;
    }

    // ════════════════════════════════════════════════════
    //  LOAD / STATE
    // ════════════════════════════════════════════════════
    function showLoading(msg='Carregando dados...') {
      document.getElementById('dashGrid').innerHTML = `
        <div class="kpi-row"><div class="state-wrap" style="grid-column:1/-1">
          <div class="loading-row"><div class="spinner"></div>${msg}</div>
        </div></div>`;
    }

    function showError(msg) {
      allItems=null; fechadoCache=null;
      document.getElementById('dashGrid').innerHTML=`
        <div class="kpi-row"><div class="state-wrap" style="grid-column:1/-1">
          <div class="error-box">❌ ${msg}</div>
        </div></div>`;
    }

    async function loadData() {
      const year  = parseInt(document.getElementById('yearSelect').value);
      const month = parseInt(document.getElementById('monthSelect').value);
      try {
        await Promise.all([fetchAllItems(), fetchInvestimentos()]);
        const leads        = getLeads(year, month);
        const agendaItems  = getAgendadas(year, month);
        const closings     = getClosingsFilter(year, month, closingFilter);
        const monthKey     = `${year}-${pad(month)}`;
        const investimento = investimentos[monthKey] || 0;
        renderDash(calcKPIs(leads,agendaItems,closings), calcClosers(agendaItems,closings), calcSDRs(agendaItems), year, month, investimento, closings);
      } catch(err) {
        showError(`Erro ao buscar dados: ${err.message}`);
      }
    }

    // ════════════════════════════════════════════════════
    //  INLINE EDIT META
    // ════════════════════════════════════════════════════
    function startInlineEdit(monthKey, currentMeta) {
      const el  = document.getElementById('meta-val');
      const sub = document.getElementById('meta-sub');
      if (!el) return;
      el.onclick = null;
      el.classList.remove('meta-editable');
      el.innerHTML = `<input id="meta-inline-input" class="meta-inline-input" type="number"
        min="0" step="1000" value="${currentMeta || ''}" placeholder="Ex: 80000"
        onblur="saveInlineMeta('${monthKey}', this)"
        onkeydown="if(event.key==='Enter'){this.blur()}else if(event.key==='Escape'){loadData()}">`;
      if (sub) { sub.innerHTML = '<span class="meta-hint">Enter para salvar · Esc para cancelar</span>'; }
      const input = document.getElementById('meta-inline-input');
      input.focus();
      input.select();
    }

    function saveInlineMeta(monthKey, input) {
      const val = parseFloat(input.value);
      if (!isNaN(val) && val >= 0) {
        try {
          const overrides = JSON.parse(localStorage.getItem('metas_override') || '{}');
          overrides[monthKey] = val;
          localStorage.setItem('metas_override', JSON.stringify(overrides));
        } catch(e) { console.error('Erro ao salvar meta:', e); }
      }
      loadData();
    }

    // ════════════════════════════════════════════════════
    //  INIT
    // ════════════════════════════════════════════════════
    initSelectors();
    loadData();
  </script>
</body>
</html>
